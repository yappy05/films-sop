spring:
  application:
    name: audit-service

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

    listener:
      simple:
        observation-enabled: true

        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2.0

    template:
      observation-enabled: true

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
