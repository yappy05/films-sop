spring:
  application:
    name: audit-service

  # ─── RabbitMQ ───────────────────────────────────────────────────────
  # Подключение к локальному брокеру (docker run rabbitmq:4-management)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

    # Наблюдаемость: Spring Boot передаёт trace-id из AMQP-заголовков в MDC логгера.
    # Это позволяет связать запрос в rest-service с обработкой в audit-service.
    listener:
      simple:
        observation-enabled: true
        # Retry: при ошибке обработки повторить 3 раза с интервалом 2 секунды.
        # После исчерпания попыток сообщение уходит в DLQ (настроено в RabbitMQConfig).
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2.0

    template:
      observation-enabled: true

# ─── Сервер ─────────────────────────────────────────────────────────
# audit-service работает на другом порту, чтобы не конфликтовать с rest-service (8080)
server:
  port: 8081

# ─── Actuator ───────────────────────────────────────────────────────
# Health endpoint показывает состояние подключения к RabbitMQ.
# В промышленных системах это используется для readiness-проверок в Kubernetes.
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
