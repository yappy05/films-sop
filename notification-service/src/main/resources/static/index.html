<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Центр уведомлений</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg-primary: #0f1117;
                --bg-secondary: #1a1d27;
                --bg-card: #222635;
                --bg-card-hover: #2a2e3d;
                --border: #2e3347;
                --text-primary: #e4e7ef;
                --text-secondary: #8b92a8;
                --text-muted: #5c6380;
                --accent-blue: #5b8def;
                --accent-green: #34d399;
                --accent-amber: #fbbf24;
                --accent-red: #f87171;
                --accent-purple: #a78bfa;
                --accent-cyan: #22d3ee;
                --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
                --radius: 12px;
                --radius-sm: 8px;
            }

            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                background: var(--bg-primary);
                color: var(--text-primary);
                min-height: 100vh;
                line-height: 1.5;
            }

            .header {
                background: var(--bg-secondary);
                border-bottom: 1px solid var(--border);
                padding: 16px 32px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: sticky;
                top: 0;
                z-index: 100;
                backdrop-filter: blur(12px);
            }

            .header-left {
                display: flex;
                align-items: center;
                gap: 14px;
            }

            .header-logo {
                font-size: 28px;
                line-height: 1;
            }

            .header-title {
                font-size: 20px;
                font-weight: 700;
                letter-spacing: -0.02em;
            }

            .header-subtitle {
                font-size: 12px;
                color: var(--text-muted);
                margin-top: 1px;
            }

            .header-right {
                display: flex;
                align-items: center;
                gap: 16px;
            }

            .status {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 14px;
                border-radius: 20px;
                font-size: 13px;
                font-weight: 500;
                border: 1px solid var(--border);
                background: var(--bg-card);
                transition: all 0.3s ease;
            }

            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                transition: background 0.3s ease;
            }

            .status.connected {
                border-color: rgba(52, 211, 153, 0.3);
            }
            .status.connected .status-dot {
                background: var(--accent-green);
                box-shadow: 0 0 8px var(--accent-green);
                animation: pulse-green 2s infinite;
            }

            .status.disconnected {
                border-color: rgba(248, 113, 113, 0.3);
            }
            .status.disconnected .status-dot {
                background: var(--accent-red);
                box-shadow: 0 0 8px var(--accent-red);
            }

            .status.reconnecting {
                border-color: rgba(251, 191, 36, 0.3);
            }
            .status.reconnecting .status-dot {
                background: var(--accent-amber);
                box-shadow: 0 0 8px var(--accent-amber);
                animation: pulse-amber 1s infinite;
            }

            @keyframes pulse-green {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }
            @keyframes pulse-amber {
                0%,
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
                50% {
                    opacity: 0.6;
                    transform: scale(1.3);
                }
            }

            .badge {
                background: var(--accent-blue);
                color: #fff;
                font-size: 12px;
                font-weight: 700;
                min-width: 24px;
                height: 24px;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0 8px;
            }

            .btn {
                padding: 8px 16px;
                border-radius: var(--radius-sm);
                border: 1px solid var(--border);
                background: var(--bg-card);
                color: var(--text-secondary);
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s ease;
                font-family: inherit;
            }

            .btn:hover {
                background: var(--bg-card-hover);
                color: var(--text-primary);
                border-color: var(--text-muted);
            }

            .btn-danger:hover {
                border-color: rgba(248, 113, 113, 0.5);
                color: var(--accent-red);
            }

            .container {
                max-width: 720px;
                margin: 0 auto;
                padding: 24px 16px;
            }

            .empty-state {
                text-align: center;
                padding: 80px 20px;
                color: var(--text-muted);
            }

            .empty-state-icon {
                font-size: 64px;
                margin-bottom: 16px;
                opacity: 0.5;
            }

            .empty-state-text {
                font-size: 16px;
                margin-bottom: 8px;
            }

            .empty-state-hint {
                font-size: 13px;
                max-width: 400px;
                margin: 0 auto;
            }

            .notification {
                background: var(--bg-card);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 16px 20px;
                margin-bottom: 10px;
                display: flex;
                gap: 14px;
                transition: all 0.2s ease;
                animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
                position: relative;
                overflow: hidden;
            }

            .notification:hover {
                background: var(--bg-card-hover);
                border-color: var(--text-muted);
                transform: translateX(2px);
            }

            .notification::before {
                content: "";
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 3px;
            }

            .notification.level-success::before {
                background: var(--accent-green);
            }
            .notification.level-warning::before {
                background: var(--accent-amber);
            }
            .notification.level-info::before {
                background: var(--accent-blue);
            }

            .notification.is-new {
                animation:
                    slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                    glow 1.5s ease-out;
            }

            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(-16px) scale(0.97);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            @keyframes glow {
                0% {
                    box-shadow: 0 0 20px rgba(91, 141, 239, 0.3);
                }
                100% {
                    box-shadow: none;
                }
            }

            .notification-icon {
                width: 40px;
                height: 40px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                flex-shrink: 0;
            }

            .icon-film-plus {
                background: rgba(52, 211, 153, 0.12);
            }
            .icon-film-edit {
                background: rgba(91, 141, 239, 0.12);
            }
            .icon-film-remove {
                background: rgba(248, 113, 113, 0.12);
            }
            .icon-analytics {
                background: rgba(167, 139, 250, 0.12);
            }
            .icon-director-plus {
                background: rgba(34, 211, 238, 0.12);
            }
            .icon-director-remove {
                background: rgba(251, 191, 36, 0.12);
            }
            .icon-bell {
                background: rgba(139, 146, 168, 0.12);
            }

            .notification-body {
                flex: 1;
                min-width: 0;
            }

            .notification-title {
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 3px;
            }

            .notification-desc {
                font-size: 13px;
                color: var(--text-secondary);
                line-height: 1.45;
                word-break: break-word;
            }

            .notification-meta {
                display: flex;
                gap: 12px;
                margin-top: 8px;
                font-size: 11px;
                color: var(--text-muted);
            }

            .notification-meta span {
                display: flex;
                align-items: center;
                gap: 4px;
            }

            .log-toggle {
                text-align: center;
                margin-top: 32px;
            }

            .log-area {
                margin-top: 16px;
                background: var(--bg-secondary);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 16px;
                font-family: "JetBrains Mono", "Fira Code", monospace;
                font-size: 11px;
                color: var(--text-muted);
                max-height: 200px;
                overflow-y: auto;
                display: none;
            }

            .log-area.visible {
                display: block;
            }

            .log-entry {
                padding: 2px 0;
            }
            .log-entry.error {
                color: var(--accent-red);
            }
            .log-entry.warn {
                color: var(--accent-amber);
            }
            .log-entry.info {
                color: var(--accent-green);
            }
        </style>
    </head>
    <body>
        <header class="header">
            <div class="header-left">
                <div class="header-logo">🔔</div>
                <div>
                    <div class="header-title">Центр уведомлений</div>
                    <div class="header-subtitle">
                        notification-service · WebSocket · RabbitMQ
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="badge" id="badge">0</div>
                <div class="status disconnected" id="status">
                    <div class="status-dot"></div>
                    <span id="status-text">Отключено</span>
                </div>
                <button class="btn btn-danger" onclick="clearAll()">
                    Очистить
                </button>
            </div>
        </header>

        <main class="container">
            <div id="empty-state" class="empty-state">
                <div class="empty-state-icon">🔕</div>
                <div class="empty-state-text">Нет уведомлений</div>
                <div class="empty-state-hint">
                    Создайте режиссёра или фильмову через REST API (POST
                    http://localhost:8080/api/directors), и уведомления появятся
                    здесь в реальном времени :)
                </div>
            </div>
            <div id="notifications"></div>

            <div class="log-toggle">
                <button class="btn" onclick="toggleLog()">
                    Показать лог подключения
                </button>
            </div>
            <div class="log-area" id="log-area"></div>
        </main>

        <script>
            const WS_URL = `ws://localhost:8084/ws/notifications`;
            const RECONNECT_BASE_MS = 1000;
            const RECONNECT_MAX_MS = 30000;

            let ws = null;
            let reconnectAttempt = 0;
            let reconnectTimer = null;
            let notificationCount = 0;

            const ICONS = {
                "film-plus": "📗",
                "film-edit": "📝",
                "film-remove": "🗑️",
                analytics: "🔬",
                "director-plus": "👤",
                "director-remove": "❌",
                bell: "🔔",
            };

            const $status = document.getElementById("status");
            const $statusText = document.getElementById("status-text");
            const $badge = document.getElementById("badge");
            const $list = document.getElementById("notifications");
            const $empty = document.getElementById("empty-state");
            const $log = document.getElementById("log-area");

            function connect() {
                if (
                    ws &&
                    (ws.readyState === WebSocket.OPEN ||
                        ws.readyState === WebSocket.CONNECTING)
                ) {
                    return;
                }

                setStatus("reconnecting", "Подключение...");
                addLog("info", `Подключение к ${WS_URL}...`);

                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    reconnectAttempt = 0;
                    setStatus("connected", "Подключено");
                    addLog("info", "WebSocket подключён");
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);

                        if (data.type === "CONNECTED") {
                            addLog(
                                "info",
                                `Сервер: ${data.message} (подключений: ${data.activeConnections})`,
                            );
                            return;
                        }

                        if (data.type === "PONG") {
                            addLog("info", "Pong получен");
                            return;
                        }

                        if (data.type === "NOTIFICATION") {
                            addNotification(data);
                        }
                    } catch (e) {
                        addLog("error", `Ошибка парсинга: ${e.message}`);
                    }
                };

                ws.onclose = (event) => {
                    setStatus("disconnected", "Отключено");
                    addLog(
                        "warn",
                        `WebSocket закрыт (code: ${event.code}, reason: ${event.reason || "нет"})`,
                    );
                    scheduleReconnect();
                };

                ws.onerror = () => {
                    addLog("error", "Ошибка WebSocket");
                };
            }

            function scheduleReconnect() {
                const delay = Math.min(
                    RECONNECT_BASE_MS * Math.pow(2, reconnectAttempt),
                    RECONNECT_MAX_MS,
                );
                reconnectAttempt++;
                setStatus(
                    "reconnecting",
                    `Переподключение через ${(delay / 1000).toFixed(0)}с...`,
                );
                addLog(
                    "warn",
                    `Переподключение #${reconnectAttempt} через ${delay}мс`,
                );
                clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(connect, delay);
            }

            function setStatus(state, text) {
                $status.className = `status ${state}`;
                $statusText.textContent = text;
            }

            function addNotification(data) {
                $empty.style.display = "none";
                notificationCount++;
                $badge.textContent = notificationCount;

                const card = document.createElement("div");
                card.className = `notification level-${data.level || "info"} is-new`;

                const iconClass = `icon-${data.icon || "bell"}`;
                const iconEmoji = ICONS[data.icon] || "🔔";

                const eventTime = data.eventTimestamp
                    ? new Date(data.eventTimestamp).toLocaleTimeString("ru-RU")
                    : "";
                const receivedTime = data.receivedAt
                    ? new Date(data.receivedAt).toLocaleTimeString("ru-RU")
                    : new Date().toLocaleTimeString("ru-RU");

                card.innerHTML = `
            <div class="notification-icon ${iconClass}">${iconEmoji}</div>
            <div class="notification-body">
                <div class="notification-title">${escapeHtml(data.title)}</div>
                <div class="notification-desc">${escapeHtml(data.description)}</div>
                <div class="notification-meta">
                    <span>${receivedTime}</span>
                    <span>${escapeHtml(data.source)}</span>
                    <span>${escapeHtml(data.eventType)}</span>
                </div>
            </div>
        `;

                $list.prepend(card);

                setTimeout(() => card.classList.remove("is-new"), 1500);

                document.title = `(${notificationCount}) Центр уведомлений`;
            }

            function clearAll() {
                $list.innerHTML = "";
                notificationCount = 0;
                $badge.textContent = "0";
                $empty.style.display = "";
                document.title = "Центр уведомлений";
            }

            function addLog(level, message) {
                const entry = document.createElement("div");
                entry.className = `log-entry ${level}`;
                const time = new Date().toLocaleTimeString("ru-RU");
                entry.textContent = `[${time}] ${message}`;
                $log.appendChild(entry);
                $log.scrollTop = $log.scrollHeight;
            }

            function toggleLog() {
                $log.classList.toggle("visible");
            }

            function escapeHtml(str) {
                if (!str) return "";
                const div = document.createElement("div");
                div.textContent = str;
                return div.innerHTML;
            }

            connect();
        </script>
    </body>
</html>
